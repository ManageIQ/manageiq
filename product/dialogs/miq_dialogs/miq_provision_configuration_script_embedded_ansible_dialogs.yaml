---
:name: miq_provision_configuration_script_embedded_ansible_dialogs
:description: Sample Configuration Script Embedded Ansible Provisioning Dialog
:dialog_type: MiqProvisionConfigurationScriptWorkflow
:content:
  :buttons:
  - :submit
  - :cancel
  :dialogs:
    :requester:
      :description: Request
      :fields:
        :owner_phone:
          :description: Phone
          :required: false
          :display: :hide
          :data_type: :string
        :owner_country:
          :description: Country/Region
          :required: false
          :display: :hide
          :data_type: :string
        :owner_phone_mobile:
          :description: Mobile
          :required: false
          :display: :hide
          :data_type: :string
        :owner_title:
          :description: Title
          :required: false
          :display: :hide
          :data_type: :string
        :owner_first_name:
          :description: First Name
          :required: false
          :display: :edit
          :data_type: :string
        :owner_manager:
          :description: Name
          :required: false
          :display: :edit
          :data_type: :string
        :owner_address:
          :description: Address
          :required: false
          :display: :hide
          :data_type: :string
        :owner_company:
          :description: Company
          :required: false
          :display: :hide
          :data_type: :string
        :owner_last_name:
          :description: Last Name
          :required: false
          :display: :edit
          :data_type: :string
        :owner_manager_mail:
          :description: E-Mail
          :required: false
          :display: :hide
          :data_type: :string
        :owner_city:
          :description: City
          :required: false
          :display: :hide
          :data_type: :string
        :owner_department:
          :description: Department
          :required: false
          :display: :hide
          :data_type: :string
        :owner_manager_phone:
          :description: Phone
          :required: false
          :display: :hide
          :data_type: :string
        :owner_state:
          :description: State
          :required: false
          :display: :hide
          :data_type: :string
        :owner_office:
          :description: Office
          :required: false
          :display: :hide
          :data_type: :string
        :owner_zip:
          :description: Zip code
          :required: false
          :display: :hide
          :data_type: :string
        :owner_email:
          :description: E-Mail
          :required_method: :validate_regex
          :required_regex: !ruby/regexp /\A[\w!#$\%&'*+\/=?`\{|\}~^-]+(?:\.[\w!#$\%&'*+\/=?`\{|\}~^-]+)*@(?:[A-Z0-9-]+\.)+[A-Z]{2,6}\Z/i
          :required: true
          :display: :edit
          :data_type: :string
        :request_notes:
          :description: Notes
          :required: false
          :display: :edit
          :data_type: :string
      :display: :show
      :field_order:
    :purpose:
      :description: Purpose
      :fields:
        :tag_ids:
          :required_method: :validate_tags
          :description: Tags
          :required: false
          :options:
            :include: []
            :order: []
            :single_select: []
            :exclude: []
          :display: :edit
          :required_tags: []
          :data_type: :integer
      :display: :show
      :field_order:
    :provision:
      :description: Provision
      :fields:
        :verbosity:
          :description: Verbosity
          :values:
            0: Normal
            1: Verbose
            2: More Verbose
            3: Debug
            4: Connection Debug
            5: WinRM Debug
          :notes:
          :required: false
          :display: :edit
          :default: 0
          :data_type: :integer
        :log_output:
          :description: Log Output
          :values:
            on_error: On Error
            always: Always
            never: Never
          :notes:
          :required: false
          :display: :edit
          :default: on_error
          :data_type: :string
        :execution_ttl:
          :description: Max TTL (mins)
          :notes:
          :required: false
          :display: :edit
          :data_type: :integer
        :credential_id:
          :values_from:
            :method: :allowed_machine_credentials
          :description: Machine Credential
          :required: true
          :display: :edit
          :data_type: :integer
        :vault_credential_id:
          :values_from:
            :method: :allowed_vault_credentials
          :description: Vault Credential
          :required: false
          :display: :edit
          :data_type: :integer
        :cloud_credential_type:
          :values_from:
            :method: :allowed_cloud_credential_types
          :description: Cloud Type
          :required: false
          :display: :edit
          :data_type: :string
        :cloud_credential_id:
          :values_from:
            :method: :allowed_cloud_credentials
          :description: Cloud Credential
          :required: false
          :display: :edit
          :data_type: :integer
      :display: :show
    :service:
      :description: Catalog
      :fields:
        :src_configuration_script_id:
          :values_from:
            :method: :allowed_configuration_scripts
          :description: Configuration Script
          :required: true
          :notes:
          :display: :edit
          :data_type: :integer
          :notes_display: :show
      :display: :show
    :schedule:
      :description: Schedule
      :fields:
        :schedule_type:
          :values:
            schedule: Schedule
            immediately: Immediately on Approval
          :description: When to Provision
          :required: false
          :display: :edit
          :default: immediately
          :data_type: :string
        :schedule_time:
          :values_from:
            :options:
              :offset: 1.day
            :method: :default_schedule_time
          :description: Provision on
          :required: false
          :display: :edit
          :data_type: :time
      :display: :show
  :dialog_order:
  - :requester
  - :purpose
  - :service
  - :provision
  - :schedule
